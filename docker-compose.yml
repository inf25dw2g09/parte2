services:

  # ── 1. Base de dados MySQL ─────────────────────────────────
  db:
    image: inf26dw2g09/db-task:latest
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: task_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 2. API REST Node.js ────────────────────────────────────
  api:
    image: inf26dw2g09/api-task:latest
    container_name: node_api
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root_password
      DB_NAME: task_db
      JWT_SECRET: umaia_secret_2024
    restart: unless-stopped

  # ── 3. Aplicação Web React ─────────────────────────────────
  client:
    image: inf26dw2g09/client-task:latest
    container_name: react_client
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data: